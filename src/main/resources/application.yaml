server:
  port: 8081
app:
  ai:
    provider: openai # or openai /vertexai
spring:
  application:
    name: gen-ai-java-spring
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:7432/postgres?currentSchema=public&binaryTransfer=true&reWriteBatchedInserts=true&stringtype=unspecified
    username: postgres
    password: postgres
#  sql:
#    init:
#      mode: always
#      data-locations: classpath:db/data.sql
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1024
        max-document-batch-size: 10000
    openai:
      api-key: ${OPENAI_API_KEY} # ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
      audio:
        transcription:
          options:
            model: whisper-1
            language: en
            response-format: vtt
            temperature: 0.7
        speech:
          options:
            model: tts-1
            language: en
            response-format: mp3
            speed: 1.0
      image:
        options:
          model: gpt-image-2
#          n: 1
          size: 1024x1024
#          style: vivid
#          quality: hd
          # Additional image options
    #          response_format: url
#    DOCKER MODEL
#    openai:
#      api-key: dummy # ${OPENAI_API_KEY}
#      base-url: http://localhost:12434/engines/llama.cpp
#      chat:
#        options:
#          model: docker.io/gemma4:latest
#          model: Qwen/Qwen2.5-Coder-7B-Instruct:nscale
#      base-url: https://router.huggingface.co
    vertex:
      ai:
        gemini:
          project-id: ${VERTEX_PROJECT_ID}
          location: us-central1
          chat:
            options:
              model: gemini-2.5-flash
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
#          model: custom-mistral-model:latest
          model: mistral:7b
          max-new-tokens: 512
          temperature: 0.7
#    huggingface:
#      chat:
#        api-key: ${HUGGINGFACE_API_KEY}
#        url:
#        options:
#          model: Qwen/Qwen2.5-Coder-7B-Instruct
#          max-new-tokens: 1024
#          temperature: 0.7
logging:
  level:
    root: INFO
    com.genai.java.spring: INFO
    org.springframework.ai: INFO
    org:
      springframework:
        ai:
          chat:
            client:
              advisor:
                SimpleLoggerAdvisor: DEBUG
